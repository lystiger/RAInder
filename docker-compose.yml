services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=explicit
      --load-model=real_esrgan_x2
      --load-model=real_esrgan_x4
    volumes:
      - ./model_repo:/models
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8000"
    gpus: all

  gateway:
    build:
      context: ./gateway_api
    environment:
      TRITON_URL: triton:8001
      TRITON_MODEL_NAME: real_esrgan_x2
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    depends_on:
      - triton
    ports:
      - "8000:8000"

  webapp:
    build:
      context: ./webapp
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - gateway
    ports:
      - "5173:5173"
